# Phase 5 — Kubernetes Secret for PostgreSQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: complaint-app
type: Opaque
data:
  # Base64 encoded values (admin = YWRtaW4=, admin123 = YWRtaW4xMjM=, complaintsdb = Y29tcGxhaW50c2Ri)
  POSTGRES_USER: YWRtaW4=
  POSTGRES_PASSWORD: YWRtaW4xMjM=
  POSTGRES_DB: Y29tcGxhaW50c2Ri
