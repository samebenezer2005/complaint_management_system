# Phase 5 — Kubernetes Service for Flask App
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: complaint-app
  labels:
    app: flask-app
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
