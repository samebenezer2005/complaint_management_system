<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complaint Management System</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; text-align: center; }
    .card { background: white; padding: 24px; border-radius: 8px; margin-bottom: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { background: #4CAF50; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #45a049; }
    .complaint-item { background: #f9f9f9; border-left: 4px solid #4CAF50; padding: 12px; margin-bottom: 12px; border-radius: 4px; }
    .status { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
    #message { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Complaint Management System</h1>

  <div class="card">
    <h2>Submit a Complaint</h2>
    <input type="text" id="name" placeholder="Your Name" />
    <input type="email" id="email" placeholder="Your Email" />
    <textarea id="complaint" rows="4" placeholder="Describe your complaint..."></textarea>
    <button onclick="submitComplaint()">Submit</button>
    <p id="message"></p>
  </div>

  <div class="card">
    <h2>All Complaints</h2>
    <div id="complaints-list">Loading...</div>
  </div>

  <script>
    async function loadComplaints() {
      const res = await fetch('/complaints');
      const data = await res.json();
      const div = document.getElementById('complaints-list');
      if (data.length === 0) { div.innerHTML = '<p>No complaints yet.</p>'; return; }
      div.innerHTML = data.map(c => `
        <div class="complaint-item">
          <strong>${c.name}</strong> (${c.email}) — <span class="status">${c.status}</span>
          <p>${c.complaint}</p>
          <small>${c.created_at}</small>
        </div>
      `).join('');
    }

    async function submitComplaint() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const complaint = document.getElementById('complaint').value;
      if (!name || !email || !complaint) { alert('Please fill all fields'); return; }
      const res = await fetch('/complaints', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, complaint })
      });
      const data = await res.json();
      document.getElementById('message').textContent = data.message;
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('complaint').value = '';
      loadComplaints();
    }

    loadComplaints();
  </script>
</body>
</html>
